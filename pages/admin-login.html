<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin – WanderWorld</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="auth-body admin-auth-body">

<div class="auth-wrapper admin-auth-wrapper">
  <div class="auth-right" style="width:100%; max-width:460px; margin:auto;">
    <div class="auth-card admin-auth-card">
      <div class="admin-logo-area">
        <div class="admin-shield"><i class="fas fa-shield-alt"></i></div>
        <a href="../index.html" class="logo admin-logo"><span class="logo-icon">W</span> WanderWorld</a>
        <p class="admin-login-subtitle">Admin Panel</p>
      </div>
      <div class="auth-header">
        <h1>Admin Sign In</h1>
        <p>Authorized personnel only</p>
      </div>
      <div class="alert alert-error" id="adminLoginError" style="display:none;"></div>
      <form class="auth-form" id="adminLoginForm" onsubmit="handleAdminLogin(event)">
        <div class="form-group">
          <label for="adminEmail"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="adminEmail" placeholder="admin@example.com" required />
        </div>
        <div class="form-group">
          <label for="adminPassword"><i class="fas fa-lock"></i> Password</label>
          <div class="password-input">
            <input type="password" id="adminPassword" placeholder="Enter password" required />
            <button type="button" class="toggle-password" onclick="togglePassword('adminPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-auth btn-admin-auth">
          <i class="fas fa-sign-in-alt"></i> <span>Access Dashboard</span>
        </button>
      </form>
      <div class="auth-back-link">
        <a href="../index.html"><i class="fas fa-arrow-left"></i> Back to website</a>
      </div>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
