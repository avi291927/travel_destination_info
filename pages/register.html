<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Join WanderWorld – Create Your Account</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/animations.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="auth-body">

<div class="auth-wrapper">
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="../index.html" class="logo auth-logo"><span class="logo-icon">W</span> WanderWorld</a>
      <h2>Start planning your next trip</h2>
      <p>Create a free account to save destinations, get personalized picks, and join our growing travel community.</p>
      <div class="auth-features">
        <div class="auth-feature"><i class="fas fa-heart"></i> Save destinations you love</div>
        <div class="auth-feature"><i class="fas fa-star"></i> Get picks based on your taste</div>
        <div class="auth-feature"><i class="fas fa-users"></i> Connect with other travelers</div>
      </div>
      <div class="auth-bg-image">
        <img src="../images/hero-1.jpg" alt="Mountain landscape" />
      </div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Create Account</h1>
        <p>Already have one? <a href="login.html">Sign in</a></p>
      </div>
      <div class="alert alert-error" id="registerError" style="display:none;"></div>
      <div class="alert alert-success" id="registerSuccess" style="display:none;"></div>
      <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="regFirstName"><i class="fas fa-user"></i> First Name</label>
            <input type="text" id="regFirstName" placeholder="First name" required />
          </div>
          <div class="form-group">
            <label for="regLastName"><i class="fas fa-user"></i> Last Name</label>
            <input type="text" id="regLastName" placeholder="Last name" required />
          </div>
        </div>
        <div class="form-group">
          <label for="regEmail"><i class="fas fa-envelope"></i> Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="regPassword"><i class="fas fa-lock"></i> Password</label>
          <div class="password-input">
            <input type="password" id="regPassword" placeholder="At least 6 characters" required minlength="6" oninput="checkPasswordStrength(this.value)" />
            <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <span id="strengthText">Enter password</span>
          </div>
        </div>
        <div class="form-group">
          <label for="regConfirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
          <div class="password-input">
            <input type="password" id="regConfirmPassword" placeholder="Re-enter password" required />
            <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label terms-label">
            <input type="checkbox" id="agreeTerms" required />
            I agree to the <a href="#" target="_blank">Terms</a> and <a href="#" target="_blank">Privacy Policy</a>
          </label>
        </div>
        <button type="submit" class="btn-auth" id="registerBtn">
          <span>Create Account</span> <i class="fas fa-arrow-right"></i>
        </button>
      </form>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
</body>
</html>
