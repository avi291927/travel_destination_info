<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile – WanderWorld</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="../css/portal.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="portal-body">

<div class="portal-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a href="../index.html" class="logo sidebar-logo"><i class="fas fa-globe-americas"></i> WanderWorld</a>
      <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">U</div>
      <div class="sidebar-user-info">
        <span class="sidebar-username" id="sidebarUsername">User</span>
        <span class="sidebar-role">Traveler</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="user-dashboard.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
      <a href="favorites.html" class="sidebar-link"><i class="fas fa-heart"></i> My Favorites</a>
      <a href="profile.html" class="sidebar-link active"><i class="fas fa-user-edit"></i> My Profile</a>
      <a href="destinations.html" class="sidebar-link"><i class="fas fa-map-marked-alt"></i> Explore</a>
      <a href="#" class="sidebar-link" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </nav>
  </aside>

  <main class="portal-main">
    <div class="portal-topbar">
      <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
      <div class="portal-topbar-title">
        <h2><i class="fas fa-user-edit"></i> My Profile</h2>
        <span>Manage your account details</span>
      </div>
      <div class="portal-topbar-actions">
        <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
      </div>
    </div>

    <div class="portal-content">
      <div class="profile-grid">
        <div class="profile-card">
          <div class="profile-avatar-section">
            <div class="profile-avatar-large" id="profileAvatarLarge">U</div>
            <h3 id="profileFullName">User Name</h3>
            <p id="profileEmail" class="profile-email">user@example.com</p>
            <span class="profile-badge"><i class="fas fa-star"></i> Traveler Member</span>
            <p class="profile-since" id="profileSince">Member since 2024</p>
          </div>
          <div class="profile-quick-stats">
            <div class="profile-stat">
              <span class="profile-stat-num" id="profileFavCount">0</span>
              <span class="profile-stat-label">Favorites</span>
            </div>
            <div class="profile-stat">
              <span class="profile-stat-num">500+</span>
              <span class="profile-stat-label">Destinations</span>
            </div>
          </div>
        </div>

        <div class="profile-edit-card">
          <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('edit-info')">Edit Info</button>
            <button class="tab-btn" onclick="switchTab('change-password')">Change Password</button>
          </div>

          <div class="tab-content active" id="tab-edit-info">
            <div class="alert alert-success" id="profileSuccess" style="display:none;"></div>
            <div class="alert alert-error" id="profileError" style="display:none;"></div>
            <form id="profileForm" onsubmit="saveProfile(event)">
              <div class="form-row">
                <div class="form-group">
                  <label>First Name</label>
                  <input type="text" id="editFirstName" placeholder="First name" required />
                </div>
                <div class="form-group">
                  <label>Last Name</label>
                  <input type="text" id="editLastName" placeholder="Last name" required />
                </div>
              </div>
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="editEmail" placeholder="Email" required />
              </div>
              <div class="form-group">
                <label>Bio / Travel Interests</label>
                <textarea id="editBio" rows="3" placeholder="Tell us about yourself and your travel interests..."></textarea>
              </div>
              <div class="form-group">
                <label>Favorite Travel Style</label>
                <select id="editTravelStyle">
                  <option value="">Select style</option>
                  <option value="adventure">Adventure</option>
                  <option value="relaxation">Relaxation</option>
                  <option value="cultural">Cultural</option>
                  <option value="backpacking">Backpacking</option>
                  <option value="luxury">Luxury</option>
                </select>
              </div>
              <button type="submit" class="btn-primary">Save Changes</button>
            </form>
          </div>

          <div class="tab-content" id="tab-change-password">
            <div class="alert alert-success" id="pwSuccess" style="display:none;"></div>
            <div class="alert alert-error" id="pwError" style="display:none;"></div>
            <form id="passwordForm" onsubmit="changePassword(event)">
              <div class="form-group">
                <label>Current Password</label>
                <input type="password" id="currentPw" placeholder="Current password" required />
              </div>
              <div class="form-group">
                <label>New Password</label>
                <input type="password" id="newPw" placeholder="New password (min 6 chars)" required minlength="6" />
              </div>
              <div class="form-group">
                <label>Confirm New Password</label>
                <input type="password" id="confirmNewPw" placeholder="Confirm new password" required />
              </div>
              <button type="submit" class="btn-primary">Update Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../js/data.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/profile.js"></script>
</body>
</html>
